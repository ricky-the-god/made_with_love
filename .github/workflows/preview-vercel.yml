name: Preview Deploy To Vercel

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome checks
        run: npm run check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Check Vercel preview configuration
        id: preflight
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_HEAD_REPO:-}" ] && [ "$PR_HEAD_REPO" != "$CURRENT_REPO" ]; then
            echo "Preview deploy is skipped for forked pull requests because repository secrets are not exposed to them." >> "$GITHUB_STEP_SUMMARY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=0

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel preview environment
        if: steps.preflight.outputs.ready == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview with Vercel
        if: steps.preflight.outputs.ready == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview to Vercel
        if: steps.preflight.outputs.ready == 'true'
        id: deploy
        run: |
          set -euo pipefail
          vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          deployment_url="$(tail -n 1 deployment-url.txt)"

          if [ -z "$deployment_url" ]; then
            echo "Vercel deploy did not return a deployment URL." >&2
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Add preview URL to job summary
        if: steps.preflight.outputs.ready == 'true'
        run: |
          echo "## Vercel Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY

      - name: Note skipped preview deploy
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "## Vercel Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Preview deploy was skipped because the required Vercel secrets are not available in this workflow run." >> $GITHUB_STEP_SUMMARY

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request' && steps.preflight.outputs.ready == 'true'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const body = [
              "## Vercel Preview",
              "",
              process.env.DEPLOYMENT_URL,
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
